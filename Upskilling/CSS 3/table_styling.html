<!DOCTYPE html>
<html>
<head>
<style>

table{
border-collapse:collapse;
width:50%;
}

th,td{
border:1px solid black;
padding:10px;
text-align:center;
}

tr:nth-child(even){
background-color:lightgray;
}

</style>
</head>

<body>

<table>

<tr>
<th>Event</th>
<th>Fee</th>
</tr>

<tr>
<td>Music</td>
<td>500</td>
</tr>

<tr>
<td>Sports</td>
<td>300</td>
</tr>

</table>

</body>
</html>
